name: validate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv pip install --system jsonschema pytest requests click rich
      - name: Validate manifests
        run: python scripts/validate.py
      - name: Verify index.json matches sources
        run: |
          python scripts/build_index.py
          git diff --exit-code index.json || (echo "::error::index.json is out of date — run scripts/build_index.py and commit"; exit 1)
      - name: Run CLI tests
        run: pytest tests/ -v
